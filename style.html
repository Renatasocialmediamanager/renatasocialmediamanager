    <title>Style | Renata Oliver</title>
    <style>
        /* 1. Navigation - Centered Minimalist */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 5%;
            font-family: Arial, sans-serif;
            border-bottom: 1px solid #eee;
            background-color: #fff;
        }

        .main-menu {
            display: flex;
            list-style: none;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .main-menu a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Dropdown Logic */
        .dropdown { position: relative; }
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 15px 0;
            min-width: 180px;
            flex-direction: column;
            z-index: 100;
            list-style: none;
        }
        .dropdown:hover .submenu { display: flex; }
        .submenu li a { padding: 10px 20px; text-transform: none; font-weight: normal; text-align: center; display: block; }

        /* 2. Style Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .main-header {
            font-family: "Georgia", serif;
            font-size: 3.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-style: italic;
            margin-bottom: 20px;
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .grid-item img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            border-radius: 4px;
        }

        .grid-item p {
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 12px;
        }
    </style>
</head>
